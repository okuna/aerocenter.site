on: push
name: 🚀 Deploy website on push
jobs:
  test:
    name: ✅ Test
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🟢 Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 🔍 JS syntax check
      run: node --check map/src.js && node --check map/quizItems.js

    - name: 🧪 Validate data and cache-busters
      run: node scripts/validate.js

  web-deploy:
    name: 🎉 Deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 🔖 Bump cache-busters with commit SHA
      run: |
        SHORT=${GITHUB_SHA::8}
        sed -i "s|src\.js?id=[^\"]*|src.js?id=$SHORT|g; s|quizItems\.js?id=[^\"]*|quizItems.js?id=$SHORT|g" map/index.html
        echo "Bumped map/index.html cache-busters to $SHORT"
        grep "?id=" map/index.html | grep -v "googletag"

    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ftp.aerocenter.site
        username: aeronrwz
        password: ${{ secrets.ftp_password }}
        server-dir: public_html/
