on: push
name: 🚀 Deploy website on push
jobs:
  test:
    name: ✅ Test
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v5

    - name: 🟢 Setup Node
      uses: actions/setup-node@v5
      with:
        node-version: '22'

    - name: 🔍 JS syntax check
      run: node --check map/src.js && node --check map/quizItems.js

    - name: 📦 Install dependencies
      run: npm install

    - name: 🌐 Install Playwright browsers
      run: npx playwright install --with-deps chromium

    - name: 🧪 Run tests
      run: npm test

    - name: 📋 Upload Playwright report on failure
      if: failure()
      uses: actions/upload-artifact@v5
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 14

  web-deploy:
    name: 🎉 Deploy
    needs: test
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v5

    - name: 🔖 Bump cache-busters with commit SHA
      run: |
        SHORT=${GITHUB_SHA::8}
        sed -i "s|src\.js?id=[^\"]*|src.js?id=$SHORT|g; s|quizItems\.js?id=[^\"]*|quizItems.js?id=$SHORT|g" map/index.html
        echo "Bumped map/index.html cache-busters to $SHORT"
        grep "?id=" map/index.html | grep -v "googletag"

    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ftp.aerocenter.site
        username: aeronrwz
        password: ${{ secrets.ftp_password }}
        server-dir: public_html/
